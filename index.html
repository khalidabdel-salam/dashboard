<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Dashboard</title>
    <link rel="stylesheet" href="Css/style.css" />
    <link rel="stylesheet" href="Css/all.min.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Cairo:wght@200..1000&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <div class="menu">
      <ul>
        <li class="profile">
          <img src="imgs/chicken.png" alt="" />
          <h2>Chicken</h2>
        </li>
        <li>
          <a class="active" href="#">
            <i class="fa-solid fa-house"></i>
            <p>Dashboard</p>
          </a>
        </li>
        <li>
          <a href="#">
            <i class="fa-solid fa-users"></i>
            <p>Clients</p>
          </a>
        </li>
        <li>
          <a href="#">
            <i class="fa-solid fa-table"></i>
            <p>Products</p>
          </a>
        </li>
        <li>
          <a href="#">
            <i class="fa-solid fa-chart-pie"></i>
            <p>Charts</p>
          </a>
        </li>
        <li>
          <a href="#">
            <i class="fa-solid fa-star"></i>
            <p>Favorite</p>
          </a>
        </li>
        <li>
          <a href="#">
            <i class="fa-solid fa-gear"></i>
            <p>Settings</p>
          </a>
        </li>
        <li class="log-out">
          <a href="#">
            <i class="fa-solid fa-arrow-right-from-bracket"></i>
            <p>Log Out</p>
          </a>
        </li>
      </ul>
    </div>
    <div class="content">
      <div class="dashboard">
        <div class="title-info">
          <h3>dashboard</h3>
          <i class="fa-solid fa-chart-column"></i>
        </div>
        <div class="info">
          <div class="box">
            <i class="fa-solid fa-user"></i>
            <div class="box-info">
              <span>users</span>
              <span class="number">100</span>
            </div>
          </div>
          <div class="box">
            <i class="fa-solid fa-pen"></i>
            <div class="box-info">
              <span>Posts</span>
              <span class="number">34</span>
            </div>
          </div>
          <div class="box">
            <i class="fa-solid fa-table"></i>
            <div class="box-info">
              <span>Products</span>
              <span class="number">777</span>
            </div>
          </div>
          <div class="box">
            <i class="fa-solid fa-dollar-sign"></i>
            <div class="box-info">
              <span>Revenue</span>
              <span class="number">155</span>
            </div>
          </div>
        </div>
      </div>
      <div class="products">
        <div class="title-info">
          <h3>Products</h3>
          <i class="fa-solid fa-table"></i>
        </div>
        <table>
          <thead>
            <tr>
              <th>Products</th>
              <th>Price</th>
              <th>Count</th>
            </tr>
          </thead>
          <tbody>
            <tr>
              <td>tv</td>
              <td><span class="price">$123</span></td>
              <td><span class="count">876</span></td>
            </tr>
            <tr>
              <td>tv</td>
              <td><span class="price">$123</span></td>
              <td><span class="count">876</span></td>
            </tr>
            <tr>
              <td>tv</td>
              <td><span class="price">$123</span></td>
              <td><span class="count">876</span></td>
            </tr>
            <tr>
              <td>tv</td>
              <td><span class="price">$123</span></td>
              <td><span class="count">876</span></td>
            </tr>
            <tr>
              <td>tv</td>
              <td><span class="price">$123</span></td>
              <td><span class="count">876</span></td>
            </tr>
          </tbody>
        </table>
      </div>
    </div>
  </body>
</html>
